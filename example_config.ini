[camera]
ISO=100
shutter_speed=1500

[capture]
duration=2
interval=300
output_dir=./captures
sequence_name=sample
verbose=On
resolution=Max  ; options: Max (3280x2464), Large (1920x1080), Medium (1296x972), Small (640x480)
crop=0.17329545454545447,0.2570858283433134,0.4460227272727273,0.49021956087824353
crop_enabled=Off
light_source=Above

[process]
processor=./caviprocess.py
intermediates_enabled=Off
outlier_removal_enabled=On
filtering_enabled=On
thresholding_enabled=On
difference_enabled=On
roi_enabled=Off
roi=0.17329545454545447,0.2570858283433134,0.4460227272727273,0.49021956087824353
verbose=On
filter_threshold=7

[pi]
GPIO_light_channel=7
